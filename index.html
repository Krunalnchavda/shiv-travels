<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f4c81">
<title>Shiv Travels — Urbania Partner Manager</title>
<link rel="stylesheet" href="styles.css">
<!-- installable on a phone: Add to Home screen gives a full-screen app -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shiv Travels">
</head>
<body class="locked">

<!-- ---------- Login ---------- -->
<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-card" autocomplete="on">
    <div class="login-brand">
      <span class="login-logo">🚐</span>
      <div>
        <div class="login-name">Shiv Travels</div>
        <div class="login-sub">Urbania Partner Manager</div>
      </div>
    </div>

    <div class="field">
      <label for="loginUser">Username</label>
      <input type="text" id="loginUser" name="username" autocomplete="username"
             autocapitalize="none" spellcheck="false" required>
    </div>

    <div class="field">
      <label for="loginPass">Password</label>
      <div class="pass-wrap">
        <input type="password" id="loginPass" name="password" autocomplete="current-password" required>
        <button type="button" class="eye-btn" onclick="togglePassword(this)"
                aria-label="Show password" aria-pressed="false">👁️</button>
      </div>
    </div>

    <div id="loginError" class="login-error" role="alert"></div>
    <button type="submit" class="btn primary login-btn">Sign In</button>
  </form>
</div>

<header class="topbar">
  <div class="brand">
    <button id="navToggle" class="icon-btn nav-toggle" title="Menu"
            aria-label="Open menu" aria-controls="sideNav" aria-expanded="false">☰</button>
    <span class="brand-logo">🚐</span>
    <div>
      <div class="brand-name">Shiv Travels</div>
      <div class="brand-sub">Urbania Partner Manager</div>
    </div>
  </div>
  <div class="topbar-actions">
    <div id="userChip" class="user-chip"></div>
    <span id="syncBadge" class="sync-badge hidden" title=""></span>
    <button id="notifBtn" class="icon-btn" title="Notifications">🔔<span id="notifBadge" class="badge hidden">0</span></button>
    <button id="themeBtn" class="icon-btn" title="Toggle dark / light theme">🌙</button>
    <button id="logoutBtn" class="icon-btn hidden" title="Sign out">🚪</button>
  </div>
</header>

<nav class="tabs" id="mainTabs">
  <button class="tab active" data-view="dashboard">📊 Dashboard</button>
  <button class="tab" data-view="trips">🧳 Trips</button>
  <button class="tab" data-view="drivers">👨‍✈️ Drivers</button>
  <button class="tab" data-view="clients">🤝 Clients</button>
  <button class="tab" data-view="vehicles">🚐 Vehicles</button>
  <button class="tab" data-view="purchase">🧾 Purchase</button>
  <button class="tab" data-view="investments">💰 Investment</button>
  <button class="tab" data-view="expenses">💸 Expenses</button>
  <button class="tab" data-view="emi">🏦 EMI</button>
  <button class="tab" data-view="profit">💹 Profit</button>
  <button class="tab" data-view="reports">📈 Reports</button>
  <button class="tab" data-view="settings">⚙️ Settings</button>
</nav>

<div id="navBackdrop" class="nav-backdrop hidden"></div>

<div class="layout">
<aside class="side-nav" id="sideNav"></aside>
<main id="viewContainer">
  <section id="view-dashboard" class="view active"></section>
  <section id="view-trips" class="view"></section>
  <section id="view-drivers" class="view"></section>
  <section id="view-clients" class="view"></section>
  <section id="view-vehicles" class="view"></section>
  <section id="view-purchase" class="view"></section>
  <section id="view-investments" class="view"></section>
  <section id="view-expenses" class="view"></section>
  <section id="view-emi" class="view"></section>
  <section id="view-profit" class="view"></section>
  <section id="view-reports" class="view"></section>
  <section id="view-settings" class="view"></section>
</main>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h2 id="modalTitle">Modal</h2>
      <button class="icon-btn" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<!-- sync.js is a module, so it runs after the two scripts above are defined.
     It decides whether a cloud is configured and then calls startApp(). -->
<script type="module" src="sync.js"></script>
<script>
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
